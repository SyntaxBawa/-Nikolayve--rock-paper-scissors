<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Elemental Battle</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>⚔️ Elemental Battle ⚔️</h1>

<div class="choices">
    <button class="rock" onclick="play('rock')">🪨 Rock</button>
    <button class="paper" onclick="play('paper')">📄 Paper</button>
    <button class="scissors" onclick="play('scissors')">✂️ Scissors</button>
</div>

<div class="result" id="result">Make your move!</div>

<div class="scoreboard">
    You: <span id="playerScore">0</span> |
    Computer: <span id="computerScore">0</span><br>
    Streak: <span class="streak" id="streak">0</span>
</div>
